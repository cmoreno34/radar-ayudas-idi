# Workflow de GitHub Actions: ejecuta el radar cada lunes a las 08:00 (España)
# y publica el HTML actualizado en GitHub Pages automáticamente.
#
# Cron en GitHub Actions usa UTC. España (CEST verano = UTC+2, CET invierno = UTC+1).
# Programamos a las 06:00 UTC = 08:00 hora peninsular en verano (07:00 en invierno).
# También se puede lanzar a mano desde la pestaña "Actions" → "Run workflow".

name: Radar semanal de ayudas I+D+i

on:
  schedule:
    - cron: "0 6 * * 1"   # cada lunes a las 06:00 UTC
  workflow_dispatch:       # botón manual en GitHub

permissions:
  contents: write          # necesario para que el bot pueda hacer commit/push

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar el radar
        # Si existe datos/perfil_empresa.json se usa; si no, se usa el perfil demo.
        run: |
          if [ -f datos/perfil_empresa.json ]; then
            python radar.py --perfil datos/perfil_empresa.json
          else
            python radar.py --perfil demo
          fi

      - name: Publicar HTML y CSV en el repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html datos/resultados.csv
          if git diff --staged --quiet; then
            echo "Sin cambios, no hago commit."
          else
            git commit -m "🤖 Radar semanal $(date -u +%Y-%m-%d)"
            git push
          fi
